<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC Bot Dashboard</title>
  <style>
    :root {
      --bg:     #0d1117;
      --card:   #161b22;
      --border: #30363d;
      --muted:  #8b949e;
      --text:   #e6edf3;
      --green:  #3fb950;
      --red:    #f85149;
      --yellow: #e3b341;
      --blue:   #79c0ff;
      --orange: #ffa657;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* Header */
    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
      position: sticky; top: 0; z-index: 9;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand h1 { font-size: 16px; font-weight: 700; }
    .brand small { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
    .badge { background: #6639ba; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .price-block { text-align: right; }
    .price-big { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--blue); transition: color .4s; }
    .price-big.up   { color: var(--green); }
    .price-big.down { color: var(--red);   }
    .price-sub { font-size: 11px; color: var(--muted); }

    /* Grid */
    .grid { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
    .full { grid-column: 1 / -1; }

    /* Card */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .card-head { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; }

    /* Status */
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 14px;
    }
    .in-pos  { background: rgba(63,185,80,.12); color: var(--green); border: 1px solid var(--green); }
    .no-pos  { background: rgba(139,148,158,.1); color: var(--muted); border: 1px solid var(--border); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-g { background: var(--green); animation: blink 2s infinite; }
    .dot-m { background: var(--muted); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Tranches */
    .t-dots { display: flex; gap: 7px; align-items: center; margin: 6px 0 14px; }
    .t-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: #21262d; }
    .t-dot.on { background: var(--green); border-color: var(--green); }

    /* KV rows */
    .kv { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #21262d; }
    .kv:last-child { border-bottom: none; }
    .kv-k { font-size: 12px; color: var(--muted); }
    .kv-v { font-size: 13px; font-weight: 600; }

    /* Big number */
    .num-big { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; }
    .num-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Exit target rows */
    .target { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #21262d; }
    .target:last-child { border-bottom: none; }
    .t-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .t-price { font-size: 15px; font-weight: 700; }
    .t-detail { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .chip { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px; white-space: nowrap; }
    .chip-y { background: rgba(227,179,65,.15); color: var(--yellow); border: 1px solid var(--yellow); }
    .chip-g { background: rgba(63,185,80,.12); color: var(--green); border: 1px solid var(--green); }
    .chip-r { background: rgba(248,81,73,.12); color: var(--red); border: 1px solid var(--red); }
    .chip-m { background: #21262d; color: var(--muted); border: 1px solid var(--border); }

    /* Projected P&L table */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { padding: 6px 10px; text-align: right; color: var(--muted); font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    thead th:first-child { text-align: left; }
    tbody td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #21262d; }
    tbody td:first-child { text-align: left; color: var(--muted); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.cur td { background: rgba(121,192,255,.07); font-weight: 700; }
    .note-cell { font-size: 10px; color: var(--muted); text-align: left !important; }

    /* F&G gauge */
    .fng-big { font-size: 48px; font-weight: 900; text-align: center; line-height: 1; }
    .fng-lbl { font-size: 13px; font-weight: 700; text-align: center; margin: 4px 0 12px; }
    .gauge-track { height: 8px; border-radius: 4px; background: linear-gradient(to right,#1a7f37,#e3b341,#f85149); position: relative; margin-bottom: 5px; }
    .gauge-pin { position: absolute; top: -6px; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid #0d1117; transform: translateX(-50%); box-shadow: 0 0 0 2px currentColor; transition: left .6s; }
    .gauge-lbls { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); }
    .fng-box { margin-top: 10px; padding: 8px; border-radius: 6px; text-align: center; font-size: 12px; font-weight: 700; }

    /* Color utils */
    .g { color: var(--green); } .r { color: var(--red); } .y { color: var(--yellow); } .b { color: var(--blue); } .m { color: var(--muted); }

    /* Footer */
    footer { text-align: center; padding: 14px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
    footer a { color: var(--blue); text-decoration: none; }

    .empty { padding: 30px 0; text-align: center; color: var(--muted); font-size: 13px; }
    .empty .ico { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <span style="font-size:22px">⚡</span>
    <div>
      <h1>BTC Bot Dashboard <span class="badge">LIVE</span></h1>
      <small id="lastRun">Loading…</small>
    </div>
  </div>
  <div class="price-block">
    <div class="price-big" id="px">—</div>
    <div class="price-sub" id="pxSub">Fetching price…</div>
  </div>
</header>

<div class="grid" id="grid">
  <div class="card full" style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>
</div>

<footer>
  Refreshes every 30 s &nbsp;·&nbsp; Next: <strong id="cd">30</strong>s &nbsp;·&nbsp;
  <a href="https://github.com/arminherabit/btc-swing-bot/actions" target="_blank">GitHub Actions ↗</a>
</footer>

<script>
/* ── Config ── */
const PRICE_URL = 'https://api.binance.us/api/v3/ticker/price?symbol=BTCUSD';
const FNG_URL   = 'https://api.alternative.me/fng/?limit=1';
const STATE_URL = './state.json';

/* ── App state ── */
let S = {}, px = null, prevPx = null, fng = null, cd = 30, timer = null;

/* ── Fetch ── */
const get = (url) => fetch(url + (url.includes('?') ? '&' : '?') + '_=' + Date.now()).then(r => r.json());

/* ── Format ── */
const f$ = (n, d=2) => isNaN(+n) || n==null ? '—' : '$' + (+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fp = (n, d=2) => isNaN(+n) || n==null ? '—' : (n>=0?'+':'')+((+n).toFixed(d))+'%';
const ts = (iso) => {
  if (!iso) return '—';
  const m = Math.round((Date.now() - new Date(iso)) / 60000);
  return m < 1 ? 'just now' : m < 60 ? m+'m ago' : Math.floor(m/60)+'h '+m%60+'m ago';
};
const dt = (iso) => iso ? new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZoneName:'short'}) : '—';
const fngCol = v => v>=75?'var(--red)':v>=55?'var(--orange)':v>=45?'var(--yellow)':v>=25?'var(--green)':'#22c55e';

/* ── Render ── */
function render() {
  const s      = S || {};
  const inPos  = !!s.in_position;
  const tc     = +s.tranche_count || 0;
  const avgE   = +s.avg_entry  || 0;
  const qty    = +s.total_qty  || 0;
  const cost   = +s.total_cost || 0;
  const peak   = +s.highest_price || avgE;
  const rsi    = +s.rsi    || 0;
  const sma    = +s.sma200 || 0;
  const dip    = +s.dip_pct|| 0;
  const mode   = s.mode || '—';
  const news   = s.news_score;
  const partT  = +s.partial_target || 0;
  const trailT = +s.trail_stop     || 0;
  const hardT  = +s.hard_stop      || 0;
  const fngV   = fng ? fng.value : (+s.fng_value || 50);
  const fngL   = fng ? fng.label : (s.fng_label || 'Unknown');

  // P&L calcs
  const curVal = (px && qty) ? px * qty : 0;
  const upnl   = curVal - cost;
  const upnlP  = cost > 0 ? upnl / cost * 100 : 0;
  const pnlCls = upnl >= 0 ? 'g' : 'r';

  // Distance helpers
  const dist = (t) => (px && t) ? (t - px) / px * 100 : null;

  // Bull/bear
  const bull  = mode === 'BULL';
  const rsi1  = bull ? 42 : 35;
  const dipR  = bull ? 1.5 : 4.0;
  const fngC  = fngCol(fngV);
  const fngBlk = fngV >= 80, fngBst = fngV <= 25;

  // Update header
  document.getElementById('lastRun').textContent =
    'Bot last ran: ' + ts(s.last_run) + (s.last_signal ? ' · ' + s.last_signal : '');

  let h = '';

  /* ── 1. Position Status ── */
  h += `<div class="card">
    <div class="card-head">📊 Position Status</div>
    <div class="status-pill ${inPos ? 'in-pos' : 'no-pos'}">
      <span class="dot ${inPos ? 'dot-g' : 'dot-m'}"></span>
      ${inPos ? 'IN POSITION' : 'WATCHING — No Trade'}
    </div>`;

  if (inPos) {
    h += `<div style="font-size:11px;color:var(--muted);margin-bottom:3px;">Tranches deployed</div>
    <div class="t-dots">
      ${[0,1,2].map(i=>`<div class="t-dot${i<tc?' on':''}"></div>`).join('')}
      <span style="font-size:11px;color:var(--muted)">${tc}/3 &nbsp;·&nbsp; ${f$(cost,0)} deployed</span>
    </div>
    <div class="kv"><span class="kv-k">Avg Entry Price</span><span class="kv-v b">${f$(avgE)}</span></div>
    <div class="kv"><span class="kv-k">BTC Quantity</span><span class="kv-v">${qty.toFixed(5)} BTC</span></div>
    <div class="kv"><span class="kv-k">Cost Basis</span><span class="kv-v">${f$(cost)}</span></div>
    <div class="kv"><span class="kv-k">Current Value</span><span class="kv-v">${curVal?f$(curVal):'—'}</span></div>
    <div class="kv"><span class="kv-k">Partial Profit Taken</span><span class="kv-v ${s.partial_taken?'g':'m'}">${s.partial_taken?'✅ Yes (50%)':'⏳ Pending'}</span></div>
    <div class="kv"><span class="kv-k">Held Since</span><span class="kv-v" style="font-size:11px">${ts(s.entry_time)}</span></div>`;
  } else {
    h += `<div class="empty"><div class="ico">👀</div>
      Watching for dip entry<br>
      <small>RSI &lt; ${rsi1} · Dip ≥ ${dipR}% · ${mode} mode</small></div>`;
  }
  h += `</div>`;

  /* ── 2. P&L ── */
  h += `<div class="card">
    <div class="card-head">💰 Unrealized P&amp;L</div>`;
  if (inPos && px) {
    const fromPk = peak ? (px-peak)/peak*100 : null;
    h += `<div class="num-big ${pnlCls}">${upnl>=0?'+':''}${f$(upnl)}</div>
    <div class="num-sub">${fp(upnlP)} on ${f$(cost,0)} invested</div>
    <div style="margin-top:16px">
      <div class="kv"><span class="kv-k">Live Price</span><span class="kv-v b">${f$(px)}</span></div>
      <div class="kv"><span class="kv-k">Peak Since Entry</span><span class="kv-v">${f$(peak)}</span></div>
      <div class="kv"><span class="kv-k">Drawdown from Peak</span><span class="kv-v r">${fromPk!=null?fp(fromPk):'—'}</span></div>
      <div class="kv"><span class="kv-k">Break-Even</span><span class="kv-v">${f$(avgE)}</span></div>
    </div>`;
  } else {
    h += `<div class="empty"><div class="ico">💤</div>No open position</div>`;
  }
  h += `</div>`;

  /* ── 3. Exit Targets ── */
  h += `<div class="card">
    <div class="card-head">🎯 Exit Targets</div>`;
  if (inPos) {
    const ppDone = !!s.partial_taken;
    const ppPct  = avgE&&partT ? (partT-avgE)/avgE*100 : 5;
    const dpPart = dist(partT), dpTrail = dist(trailT), dpHard = dist(hardT);
    const trailPct = avgE&&trailT ? (trailT-avgE)/avgE*100 : null;
    const hardPct  = avgE&&hardT  ? (hardT-avgE)/avgE*100  : null;

    // Partial profit
    h += `<div class="target">
      <div><div class="t-label">⭐ Partial Profit — sell 50% of position</div>
        <div class="t-price y">${f$(partT)}</div>
        <div class="t-detail">+${ppPct.toFixed(1)}% from avg${dpPart!=null?' · '+fp(dpPart)+' away':''}</div>
      </div>
      <span class="chip chip-y">${ppDone?'DONE ✅':'PENDING'}</span>
    </div>`;

    // RSI exit
    h += `<div class="target">
      <div><div class="t-label">📈 RSI Exit — sell entire position</div>
        <div class="t-price g">RSI ≥ 60</div>
        <div class="t-detail">Current RSI ${rsi||'—'} ${rsi?(60-rsi).toFixed(1)+' pts to trigger':''}</div>
      </div>
      <span class="chip chip-g">${rsi>=60?'🚨 NOW':'WATCHING'}</span>
    </div>`;

    // Trailing stop
    h += `<div class="target">
      <div><div class="t-label">🔁 Trailing Stop — 3% below peak</div>
        <div class="t-price r">${f$(trailT)}</div>
        <div class="t-detail">${trailPct!=null?fp(trailPct)+' from avg':''}${dpTrail!=null?' · '+fp(dpTrail)+' from now':''}</div>
      </div>
      <span class="chip chip-r">${(px&&trailT&&px<=trailT)?'🚨 HIT':'ACTIVE'}</span>
    </div>`;

    // Hard stop
    h += `<div class="target">
      <div><div class="t-label">🛑 Hard Stop — 5% below avg entry</div>
        <div class="t-price r">${f$(hardT)}</div>
        <div class="t-detail">${hardPct!=null?fp(hardPct)+' from avg':''}${dpHard!=null?' · '+fp(dpHard)+' from now':''}</div>
      </div>
      <span class="chip chip-r">${(px&&hardT&&px<=hardT)?'🚨 HIT':'PROTECT'}</span>
    </div>`;
  } else {
    h += `<div class="empty"><div class="ico">🎯</div>Shown when in a position</div>`;
  }
  h += `</div>`;

  /* ── 4. Entry Conditions (next tranche) ── */
  h += `<div class="card">
    <div class="card-head">📥 Entry Conditions — Next Tranche</div>`;
  const rsiThresh = [rsi1, bull?36:29, bull?30:23];
  const rsiLabel  = ['T1','T2','T3'];
  const nextT     = Math.min(tc, 2);
  h += `<div class="kv"><span class="kv-k">Mode</span>
    <span class="kv-v"><span style="background:${bull?'rgba(63,185,80,.15)':'rgba(248,81,73,.12)'};color:${bull?'var(--green)':'var(--red)'};border:1px solid ${bull?'var(--green)':'var(--red)'};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">${bull?'🐂 BULL':'🐻 BEAR'}</span></span>
  </div>
  <div class="kv"><span class="kv-k">SMA 200 (4H)</span><span class="kv-v">${f$(sma,0)}</span></div>
  <div class="kv"><span class="kv-k">Current RSI (4H)</span><span class="kv-v ${rsi&&rsi<rsiThresh[nextT]?'g':''}">${rsi||'—'} ${rsi&&rsi<rsiThresh[nextT]?'✅':''}</span></div>
  <div class="kv"><span class="kv-k">RSI target (T${nextT+1})</span><span class="kv-v g">&lt; ${rsiThresh[nextT]}</span></div>
  <div class="kv"><span class="kv-k">Dip from 5-day High</span><span class="kv-v ${dip>=dipR?'g':''}">${dip?dip.toFixed(2)+'%':'—'} ${dip>=dipR?'✅':'(need '+dipR+'%)'}</span></div>
  <div class="kv"><span class="kv-k">News Score</span><span class="kv-v ${news==null?'m':news>=-5&&news<=6?'':'g'}">${news!=null?(news>=0?'+':'')+news+' / 10':'—'}</span></div>`;
  h += `</div>`;

  /* ── 5. Fear & Greed ── */
  const fgBg  = fngBlk?'rgba(248,81,73,.1)':fngBst?'rgba(63,185,80,.1)':'rgba(255,255,255,.03)';
  const fgTxt = fngBlk?'var(--red)':fngBst?'var(--green)':'var(--muted)';
  const fgMsg = fngBlk?'🚫 ENTRIES BLOCKED (≥80)':fngBst?'✅ ENTRIES BOOSTED (≤25)':'✅ Neutral — entries allowed';
  h += `<div class="card">
    <div class="card-head">😨 Fear &amp; Greed Index</div>
    <div class="fng-big" style="color:${fngC}">${fngV}</div>
    <div class="fng-lbl" style="color:${fngC}">${fngL.toUpperCase()}</div>
    <div class="gauge-track">
      <div class="gauge-pin" style="left:${fngV}%;color:${fngC}"></div>
    </div>
    <div class="gauge-lbls"><span class="g">Fear</span><span>Neutral</span><span class="r">Greed</span></div>
    <div class="fng-box" style="background:${fgBg};color:${fgTxt}">${fgMsg}</div>
    <div style="margin-top:10px">
      <div class="kv"><span class="kv-k">Block entries if</span><span class="kv-v r">≥ 80</span></div>
      <div class="kv"><span class="kv-k">Boost entries if</span><span class="kv-v g">≤ 25</span></div>
    </div>
  </div>`;

  /* ── 6. Reward Engine ── */
  const af     = +s.aggressiveness_factor || 0;
  const reward = +s.cycle_reward          || 0;
  const ravg   = +s.reward_rolling_avg    || 0;
  const rHist  = Array.isArray(s.reward_history) ? s.reward_history.map(Number) : [];

  const afLabel = af >= 0.35 ? 'HIGH 🔥' : af >= 0.20 ? 'MEDIUM' : af >= 0.05 ? 'LOW' : 'DEFENSIVE';
  const afColor = af >= 0.35 ? 'var(--green)' : af >= 0.15 ? 'var(--blue)' : af >= 0 ? 'var(--yellow)' : 'var(--red)';
  const afBarW  = Math.round(((af + 0.2) / 0.7) * 100);

  const rewardColor = reward >= 0 ? 'var(--green)' : 'var(--red)';
  const ravgColor   = ravg   >= 0 ? 'var(--green)' : 'var(--red)';

  let sparkSvg = '';
  if (rHist.length > 1) {
    const mn = Math.min(...rHist), mx = Math.max(...rHist);
    const range = mx - mn || 0.001;
    const W = 300, H = 44;
    const pts = rHist.map((v, i) => {
      const x = (i / (rHist.length - 1)) * W;
      const y = H - ((v - mn) / range) * H;
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    const zeroY = H - ((0 - mn) / range) * H;
    sparkSvg = '<svg width="' + W + '" height="' + H + '" style="display:block;margin-top:6px;overflow:visible">' +
      '<line x1="0" y1="' + zeroY.toFixed(1) + '" x2="' + W + '" y2="' + zeroY.toFixed(1) + '" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>' +
      '<polyline points="' + pts + '" fill="none" stroke="' + (ravg>=0?'var(--green)':'var(--red)') + '" stroke-width="2" stroke-linejoin="round"/>' +
      '</svg>';
  }

  const pReturn = (inPos && px && avgE) ? (px - avgE) / avgE : 0;
  const drawdown = (inPos && peak && px && px < peak) ? (peak - px) / peak : 0;

  h += '<div class="card span2">' +
    '<div class="card-head">⚡ Reward Engine &nbsp;<span style="font-size:9px;color:var(--muted);font-weight:400">reward = portfolio_return × (1 + AF) − 0.3 × drawdown − tx_costs</span></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">' +
      '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">AGGRESSIVENESS FACTOR</div>' +
        '<div style="font-size:28px;font-weight:900;color:' + afColor + '">' + af.toFixed(3) + '</div>' +
        '<div style="font-size:11px;color:' + afColor + ';margin-top:2px">' + afLabel + '</div>' +
        '<div style="height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden">' +
          '<div style="height:100%;width:' + Math.min(100,Math.max(0,afBarW)) + '%;background:' + afColor + ';border-radius:3px;transition:width .5s"></div>' +
        '</div>' +
      '</div>' +
      '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">CYCLE REWARD</div>' +
        '<div style="font-size:28px;font-weight:900;color:' + rewardColor + '">' + (reward>=0?'+':'') + reward.toFixed(4) + '</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">this hour</div>' +
      '</div>' +
      '<div style="background:#21262d;border-radius:8px;padding:12px;text-align:center">' +
        '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">24H AVG REWARD</div>' +
        '<div style="font-size:28px;font-weight:900;color:' + ravgColor + '">' + (ravg>=0?'+':'') + ravg.toFixed(4) + '</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + rHist.length + ' cycles</div>' +
      '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">' +
      '<div class="kv"><span class="kv-k">Portfolio Return</span><span class="kv-v ' + (pReturn>=0?'g':'r') + '">' + fp(pReturn*100) + '</span></div>' +
      '<div class="kv"><span class="kv-k">Max Drawdown</span><span class="kv-v r">' + (drawdown>0?'-'+fp(drawdown*100):'0.00%') + '</span></div>' +
      '<div class="kv"><span class="kv-k">TX Costs</span><span class="kv-v r">' + (inPos?'-'+(tc*0.2).toFixed(2)+'%':'—') + '</span></div>' +
      '<div class="kv"><span class="kv-k">AF → RSI Bonus</span><span class="kv-v g">+' + Math.floor(af*10) + ' pts</span></div>' +
    '</div>' +
    '<div style="margin-top:10px">' +
      '<div style="font-size:10px;color:var(--muted);margin-bottom:2px">Reward trend — last ' + rHist.length + ' hourly cycles</div>' +
      (sparkSvg || '<div style="color:var(--muted);font-size:11px;padding:6px 0">Accumulating — shown after 2+ cycles</div>') +
    '</div>' +
  '</div>';

  /* ── 7. RL Signal card ── */
  const rlAction  = s.rl_action     || 'NONE';
  const rlConf    = +(s.rl_confidence || 0);
  const rlActive  = !!s.rl_override;
  const rlColors  = { BUY_TRANCHE:'var(--green)', SELL_ALL:'var(--red)', SELL_PARTIAL:'var(--yellow)', HOLD:'var(--muted)', NONE:'var(--muted)' };
  const rlIcons   = { BUY_TRANCHE:'📈', SELL_ALL:'💰', SELL_PARTIAL:'⭐', HOLD:'⏸️', NONE:'💤' };
  const rlColor   = rlColors[rlAction] || 'var(--muted)';

  h += '<div class="card">' +
    '<div class="card-head">🤖 PPO RL Signal</div>' +
    '<div style="text-align:center;padding:8px 0 12px">' +
      '<div style="font-size:36px">' + (rlIcons[rlAction]||'💤') + '</div>' +
      '<div style="font-size:20px;font-weight:800;color:' + rlColor + ';margin-top:6px">' + rlAction.replace('_',' ') + '</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-top:4px">Aggressiveness = 1.5</div>' +
    '</div>' +
    '<div style="margin:0 0 12px;padding:8px;border-radius:6px;background:' +
      (rlActive ? 'rgba(63,185,80,.1)' : 'var(--bg3)') + ';text-align:center;font-size:12px;font-weight:700;color:' +
      (rlActive ? 'var(--green)' : 'var(--muted)') + '">' +
      (rlActive ? '✅ OVERRIDE ACTIVE — bot follows RL' : '⏸ Standby — using rule-based logic') +
    '</div>' +
    '<div class="kv"><span class="kv-k">Confidence</span>' +
      '<span class="kv-v ' + (rlConf>=0.7?'g':rlConf>=0.5?'y':'r') + '">' + (rlConf*100).toFixed(0) + '%</span></div>' +
    '<div class="kv"><span class="kv-k">Override gate</span><span class="kv-v">≥ 60%</span></div>' +
    '<div class="kv"><span class="kv-k">Algorithm</span><span class="kv-v">PPO (MLP 256×256×128)</span></div>' +
    '<div class="kv"><span class="kv-k">Training steps</span><span class="kv-v">1,000,000</span></div>' +
    '<div class="kv"><span class="kv-k">Entropy coef</span><span class="kv-v">0.015 (aggressive)</span></div>' +
  '</div>';

  /* ── 8. Market Signals ── */
  h += `<div class="card">
    <div class="card-head">📡 Market Signals</div>
    <div class="kv"><span class="kv-k">RSI (4H Wilder 14)</span><span class="kv-v ${rsi>=60?'r':rsi<=rsi1?'g':'b'}">${rsi||'—'}</span></div>
    <div style="height:5px;background:#21262d;border-radius:3px;overflow:hidden;margin-bottom:10px">
      <div style="height:100%;width:${Math.min(100,rsi)}%;background:${rsi>=60?'var(--red)':rsi<=rsi1?'var(--green)':'var(--blue)'};border-radius:3px;transition:width .5s"></div>
    </div>
    <div class="kv"><span class="kv-k">RSI exit trigger</span><span class="kv-v r">≥ 60</span></div>
    <div class="kv"><span class="kv-k">Dip from 5-day High</span><span class="kv-v ${dip>=dipR?'g':'m'}">${dip?dip.toFixed(2)+'%':'—'}</span></div>
    <div class="kv"><span class="kv-k">Live BTC Price</span><span class="kv-v b">${f$(px)}</span></div>
    <div class="kv"><span class="kv-k">Avg Entry</span><span class="kv-v">${f$(avgE)}</span></div>
    <div class="kv"><span class="kv-k">Last Bot Run</span><span class="kv-v" style="font-size:11px">${ts(s.last_run)}</span></div>
  </div>`;

  /* ── 8. Projected P&L (full width) ── */
  h += `<div class="card full">
    <div class="card-head">📉📈 Projected P&amp;L — Price Scenarios</div>`;

  if (inPos && cost > 0 && avgE > 0) {
    const rows = [-20,-15,-10,-5,-3,0,3,5,10,15,20,25,30];
    h += `<div style="overflow-x:auto"><table>
      <thead><tr>
        <th style="text-align:left">BTC Move</th>
        <th>Price</th>
        <th>Position Value</th>
        <th>Profit / Loss</th>
        <th>Return</th>
        <th style="text-align:left">Notes</th>
      </tr></thead>
      <tbody>`;

    rows.forEach(pct => {
      const scPx  = avgE * (1 + pct/100);
      const scVal = scPx * qty;
      const scPnl = scVal - cost;
      const scPct = scPnl / cost * 100;
      const isCur = px && Math.abs(px - scPx)/scPx < 0.025;
      const cls   = scPnl >= 0 ? 'g' : 'r';
      let note = '';
      if (partT  && Math.abs(scPx-partT)/partT   < .008) note = '⭐ Partial profit target';
      else if (hardT && Math.abs(scPx-hardT)/hardT < .008) note = '🛑 Hard stop';
      else if (trailT && Math.abs(scPx-trailT)/trailT < .008) note = '🔁 Trail stop';
      else if (pct===0) note = 'Break-even';

      h += `<tr${isCur?' class="cur"':''}><td style="font-weight:600;color:${pct>0?'var(--green)':pct<0?'var(--red)':'var(--muted)'}">${pct>=0?'+':''}${pct}%${isCur?' ← now':''}</td>
        <td>${f$(scPx)}</td>
        <td>${f$(scVal)}</td>
        <td class="${cls}" style="font-weight:700">${scPnl>=0?'+':''}${f$(scPnl)}</td>
        <td class="${cls}" style="font-weight:700">${fp(scPct)}</td>
        <td class="note-cell">${note}</td></tr>`;
    });
    h += `</tbody></table></div>`;
  } else {
    h += `<div class="empty"><div class="ico">📊</div>Projected P&amp;L will appear when a position is open</div>`;
  }
  h += `</div>`;

  document.getElementById('grid').innerHTML = h;
}

/* ── Price tick (every 10 s) ── */
async function tickPx() {
  try {
    const d = await get(PRICE_URL);
    const p = parseFloat(d.price);
    const el = document.getElementById('px');
    if (prevPx !== null) {
      el.className = 'price-big ' + (p > prevPx ? 'up' : p < prevPx ? 'down' : '');
      setTimeout(() => el.className = 'price-big', 1200);
    }
    prevPx = px; px = p;
    el.textContent = '$' + p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('pxSub').textContent = 'Live Binance.US · ' + new Date().toLocaleTimeString();
    render();
  } catch {}
}

/* ── Full refresh (state + F&G + price) ── */
async function refresh() {
  try {
    const [sr, pr, fr] = await Promise.allSettled([get(STATE_URL), get(PRICE_URL), get(FNG_URL)]);
    if (sr.status==='fulfilled') S   = sr.value;
    if (pr.status==='fulfilled') px  = parseFloat(pr.value.price);
    if (fr.status==='fulfilled') fng = { value: parseInt(fr.value.data[0].value), label: fr.value.data[0].value_classification };
    if (px) {
      document.getElementById('px').textContent = '$' + px.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
      document.getElementById('pxSub').textContent = 'Live Binance.US · ' + new Date().toLocaleTimeString();
    }
    render();
  } catch(e) { console.error(e); }
  startCd();
}

/* ── Countdown ── */
function startCd() {
  cd = 30;
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    cd--;
    const el = document.getElementById('cd');
    if (el) el.textContent = cd;
    if (cd <= 0) { clearInterval(timer); refresh(); }
  }, 1000);
}

/* ── Boot ── */
refresh();
setInterval(tickPx, 10000);
</script>
</body>
</html>
