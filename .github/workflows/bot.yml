name: BTC Swing Trading Bot

on:
  schedule:
    - cron: '0 * * * *'   # Every 1 hour
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write             # Needed to commit state back to repo

# Drop any queued run the moment a newer one is ready.
# This prevents runner starvation from stacking up stale cycles.
concurrency:
  group: btc-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # Hard cap — fail fast if runner stalls

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: State integrity guard (self-heal)
        run: |
          # Validate btc_state.json before the bot reads it. Repairs corrupt
          # state from the last-good git copy, or falls back to a safe FLAT
          # (cash) state — never invents a position. Read-only toward the exchange.
          python3 btc_self_heal.py || true

      - name: RL Inference (pre-signal)
        run: |
          # Install deps only when the model file exists
          if [ -f btc_rl_model.zip ]; then
            pip install -q stable-baselines3 gymnasium pandas numpy requests
            python btc_rl_inference.py --state btc_state.json --out rl_signal.json
          else
            echo '{"action":"NONE","override":false,"reason":"no_model"}' > rl_signal.json
            echo "No RL model found — bot uses rule-based logic this cycle"
          fi

      - name: Run swing bot
        shell: pwsh
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: pwsh ./btc_bot.ps1 -Once

      - name: Generate dashboard
        shell: pwsh
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: pwsh ./dashboard.ps1 -GenerateOnly

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dashboard
          path: dashboard.html
          retention-days: 7

      - name: Persist state to repo
        run: |
          git config user.name  "btc-bot[bot]"
          git config user.email "btc-bot@users.noreply.github.com"
          # Copy enriched state to docs/ so GitHub Pages dashboard can read it
          cp btc_state.json docs/state.json
          git add -f btc_state.json btc_news_cache.json docs/state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true

      - name: Deploy dashboard to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Skip gracefully if secrets not yet configured
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Netlify secrets not configured — skipping deploy"
            exit 0
          fi
          npm install -g netlify-cli --silent
          netlify deploy --prod --dir=docs --message "bot cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
