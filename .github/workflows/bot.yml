name: BTC Swing Trading Bot

on:
  schedule:
    - cron: '0 * * * *'   # Every 1 hour
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write             # Needed to commit state back to repo

# Drop any queued run the moment a newer one is ready.
# This prevents runner starvation from stacking up stale cycles.
concurrency:
  group: btc-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # Hard cap — fail fast if runner stalls

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run swing bot
        shell: pwsh
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: pwsh ./btc_bot.ps1 -Once

      - name: Generate dashboard
        shell: pwsh
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: pwsh ./dashboard.ps1 -GenerateOnly

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dashboard
          path: dashboard.html
          retention-days: 7

      - name: Persist state to repo
        run: |
          git config user.name  "btc-bot[bot]"
          git config user.email "btc-bot@users.noreply.github.com"
          # Copy enriched state to docs/ so GitHub Pages dashboard can read it
          cp btc_state.json docs/state.json
          git add -f btc_state.json btc_news_cache.json docs/state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true

      - name: Deploy dashboard to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Skip gracefully if secrets not yet configured
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Netlify secrets not configured — skipping deploy"
            exit 0
          fi
          npm install -g netlify-cli --silent
          netlify deploy --prod --dir=docs --message "bot cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Send SMS notification
        if: always()
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:    ${{ secrets.TWILIO_TO }}
        run: |
          STATE=$(cat btc_state.json 2>/dev/null || echo '{}')
          SIGNAL=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('last_signal','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          TRANCHES=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tranche_count',0))" 2>/dev/null || echo "0")
          AVG=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('avg_entry',0))" 2>/dev/null || echo "0")
          MSG="BTC Bot | $SIGNAL | T${TRANCHES}/3 | Avg \$${AVG} | Run #${{ github.run_id }}"
          curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_SID}/Messages.json" \
            --user "${TWILIO_SID}:${TWILIO_TOKEN}" \
            --data-urlencode "From=${TWILIO_FROM}" \
            --data-urlencode "To=${TWILIO_TO}" \
            --data-urlencode "Body=${MSG}"
