name: Nightly RL Retrain

# Retrains the PPO model from accumulated trade outcomes + fresh price data.
# Runs once daily at 03:00 UTC. Commits the new model only if validation passes.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  retrain:
    runs-on: ubuntu-latest
    # Best-of-3 selection (3x800k timesteps, ~50min) + 3-fold walk-forward
    # (3x300k, ~20min) + backtests + commit. 120min leaves headroom.
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_rl.txt

      - name: Review trade log
        run: |
          if [ -f trade_log.jsonl ]; then
            python btc_rl_review.py || true
          else
            echo "No trade_log.jsonl yet — running fresh training."
          fi

      - name: Retrain PPO model
        run: |
          python btc_rl_train.py

      - name: Commit updated model + stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc_rl_model.zip btc_rl_stats.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "rl: nightly retrain $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git pull --rebase origin master
            git push origin HEAD:master
          else
            echo "No model changes to commit."
          fi
